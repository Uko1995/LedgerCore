server:
  port: 8081

spring:
  application:
    name: ledger-mock
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    repair-on-validation-error: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

